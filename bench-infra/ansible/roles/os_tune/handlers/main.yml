---
# Reload (not restart) sshd so the UseDNS change takes effect WITHOUT dropping
# the live ansible control connection. `failed_when: false` because the unit
# name varies across images (ssh vs sshd) and a reload failure must not abort a
# provision run whose real work already succeeded.
- name: Reload sshd
  ansible.builtin.service:
    name: "{{ item }}"
    state: reloaded
  loop: [ssh, sshd]
  failed_when: false

[defaults]
inventory = ../inventory/hosts.yml
host_key_checking = False
roles_path = roles
# community.general.yaml callback was removed in v12; use core default + yaml format.
stdout_callback = default
result_format = yaml
forks = 3
# Connection + privilege-escalation-prompt timeout. Raised 60->120 to give a
# slow cloud-host sudo/sshd a wide margin over the observed ~62s
# "Timeout waiting for privilege escalation prompt" stall (reverse-DNS/PAM on
# the host's own name) instead of failing the whole play UNREACHABLE.
timeout = 120

[ssh_connection]
pipelining = True
# Persistent multiplexed master + keepalives: a transient per-task stall reuses
# the live master instead of re-handshaking, and a brief stall is not mistaken
# for a dead connection. ControlPersist=300s spans the gaps between iterate
# relaunches (the path that hung the denoising run).
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o PreferredAuthentications=publickey
# Reconnect on transient SSH connection failure rather than going UNREACHABLE.
retries = 3
